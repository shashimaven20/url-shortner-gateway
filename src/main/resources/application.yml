server:
  port: 8085

spring:
  redis:
    host: localhost
    port: 6379

  cloud:
    gateway:
      metrics:
        enabled: true
      routes:

        # Auth Service (Public APIs)
        - id: auth-service
          uri: http://localhost:8081
          predicates:
            - Path=/auth/**

        # URL Service (Protected APIs)
        - id: url-shortner-service
          uri: http://localhost:8080
          predicates:
            - Path=/api/**
          filters:
            - name: JwtAuthenticationFilter
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 10
                redis-rate-limiter.burstCapacity: 20
                key-resolver: "#{@userKeyResolver}"

        # Redirect Endpoint (Public)
        - id: redirect-service
          uri: http://localhost:8080
          predicates:
            - Path=/{shortCode}
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    prometheus:
      enabled: true
  metrics:
    tags:
      application: gateway-service

logging:
  level:
    org.springframework.cloud.gateway: DEBUG
    reactor.netty: DEBUG